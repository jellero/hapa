name: Update RabbitMQ lock

on:
  push:
    branches: [agent/rabbitmq-outbox-relay]

permissions:
  contents: write

jobs:
  update-lock:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: agent/rabbitmq-outbox-relay
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, redis, intl, mbstring, sockets, zip
          coverage: none
      - run: composer update php-amqplib/php-amqplib --with-all-dependencies --no-install --no-interaction --prefer-dist
      - name: Commit lockfile
        run: |
          if git diff --quiet -- composer.lock; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add composer.lock
          git commit -m "Aggiorna il lockfile per RabbitMQ"
          git push origin HEAD:agent/rabbitmq-outbox-relay
