name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:17-alpine@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
        env:
          POSTGRES_DB: hapa_test
          POSTGRES_USER: hapa
          POSTGRES_PASSWORD: ci-postgres-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hapa -d hapa_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      APP_ENV: testing
      APP_DEBUG: "false"
      APP_URL: http://localhost
      APP_TIMEZONE: UTC
      TRUSTED_PROXIES: ""
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: hapa_test
      DB_USERNAME: hapa
      DB_PASSWORD: ci-postgres-password
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      LOG_LEVEL: warning
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, redis, intl, zip
          coverage: none
      - run: composer install --no-interaction --prefer-dist
      - run: composer validate --strict
      - run: composer audit --locked
      - run: vendor/bin/phinx migrate -e testing
      - run: composer architecture:check
      - run: composer test

  static-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, redis, intl, zip
          coverage: none
      - run: composer install --no-interaction --prefer-dist --quiet
      - run: composer analyse

  production-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      APP_URL: https://hapa.example.com
      TRUSTED_PROXIES: REMOTE_ADDR
      HAPA_HTTP_BIND: 127.0.0.1
      HAPA_HTTP_PORT: 18080
      IMAGE_TAG: ci-${{ github.sha }}
      PHP_BASE_IMAGE: php:8.4-fpm-alpine
      COMPOSER_BASE_IMAGE: composer:2
      NGINX_BASE_IMAGE: nginx:1.27-alpine
      REDIS_BASE_IMAGE: redis:7.4-alpine
      POSTGRES_IMAGE: postgres:17-alpine@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
      DB_PASSWORD_FILE: ./secrets/db_password.txt
      REDIS_PASSWORD_FILE: ./secrets/redis_password.txt
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Prepare smoke secrets
        run: |
          install -d -m 0700 secrets
          printf '%s' 'ci-production-database-secret' > secrets/db_password.txt
          printf '%s' 'ci-production-redis-secret' > secrets/redis_password.txt
          chmod 0444 secrets/*.txt
      - name: Validate production Compose
        run: docker compose -f docker-compose.prod.yml config --quiet
      - name: Build production images
        run: docker compose -f docker-compose.prod.yml build --quiet php migration nginx redis
      - name: Start production PostgreSQL
        run: docker compose -f docker-compose.prod.yml up -d --wait postgres
      - name: Start production Redis
        run: docker compose -f docker-compose.prod.yml up -d --wait redis
      - name: Apply production migrations
        run: docker compose -f docker-compose.prod.yml run --rm migration migrate -e production
      - name: Start production PHP
        run: docker compose -f docker-compose.prod.yml up -d --wait php
      - name: Start production Nginx
        run: docker compose -f docker-compose.prod.yml up -d --wait nginx
      - name: Verify application liveness
        run: |
          curl --fail --silent --show-error \
            -H 'Host: hapa.example.com' \
            http://127.0.0.1:18080/health/live
      - name: Verify application readiness
        run: |
          curl --fail --silent --show-error \
            -H 'Host: hapa.example.com' \
            http://127.0.0.1:18080/health/ready
      - name: Capture Redis diagnostics
        if: failure()
        run: |
          mkdir -p diagnostics
          docker compose -f docker-compose.prod.yml ps -a > diagnostics/redis.txt 2>&1 || true
          docker compose -f docker-compose.prod.yml logs --no-color redis >> diagnostics/redis.txt 2>&1 || true
          container_id="$(docker compose -f docker-compose.prod.yml ps -aq redis)"
          if [ -n "$container_id" ]; then
            docker inspect "$container_id" >> diagnostics/redis.txt 2>&1 || true
          fi
      - name: Upload Redis diagnostics
        if: failure()
        uses: actions/upload-artifact@84480863f228bb9747b473957fcc9e309aa96097 # v4.4.2
        with:
          name: redis-production-diagnostics
          path: diagnostics/redis.txt
          retention-days: 1
      - name: Stop production stack
        if: always()
        run: docker compose -f docker-compose.prod.yml down -v --remove-orphans
