name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: hapa_test
          POSTGRES_USER: hapa
          POSTGRES_PASSWORD: ci-postgres-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hapa -d hapa_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      APP_ENV: testing
      APP_DEBUG: "false"
      APP_URL: http://localhost
      APP_TIMEZONE: UTC
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: hapa_test
      DB_USERNAME: hapa
      DB_PASSWORD: ci-postgres-password
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      REDIS_PASSWORD: ci-redis-password
      LOG_LEVEL: warning
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, redis, intl, zip
          coverage: none
      - run: composer install --no-interaction --prefer-dist
      - run: composer validate --strict
      - run: composer audit --locked
      - run: vendor/bin/phinx migrate -e testing
      - run: composer architecture:check
      - run: composer test
      - run: composer analyse
      - name: Validate production Compose
        env:
          APP_URL: https://hapa.example.com
          DB_PASSWORD: ci-production-database-secret
          REDIS_PASSWORD: ci-production-redis-secret
        run: docker compose -f docker-compose.prod.yml config --quiet
