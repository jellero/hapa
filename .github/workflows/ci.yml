name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:17-alpine@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
        env:
          POSTGRES_DB: hapa_test
          POSTGRES_USER: hapa
          POSTGRES_PASSWORD: ci-postgres-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hapa -d hapa_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      APP_ENV: testing
      APP_DEBUG: "false"
      APP_URL: http://localhost
      APP_TIMEZONE: UTC
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: hapa_test
      DB_USERNAME: hapa
      DB_PASSWORD: ci-postgres-password
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      REDIS_PASSWORD: ci-redis-password
      LOG_LEVEL: warning
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, redis, intl, zip
          coverage: none
      - run: composer install --no-interaction --prefer-dist
      - run: composer validate --strict
      - run: composer audit --locked
      - run: vendor/bin/phinx migrate -e testing
      - run: composer architecture:check
      - run: composer test
      - name: Validate production Compose
        env:
          APP_URL: https://hapa.example.com
          DB_PASSWORD_FILE: /tmp/hapa-db-secret
          REDIS_PASSWORD_FILE: /tmp/hapa-redis-secret
        run: |
          printf '%s' 'ci-production-database-secret' > "$DB_PASSWORD_FILE"
          printf '%s' 'ci-production-redis-secret' > "$REDIS_PASSWORD_FILE"
          docker compose -f docker-compose.prod.yml config --quiet

  static-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, redis, intl, zip
          coverage: none
      - run: composer install --no-interaction --prefer-dist --quiet
      - name: Run PHPStan
        id: phpstan
        continue-on-error: true
        run: vendor/bin/phpstan analyse --error-format=json > phpstan-report.json
      - name: Upload PHPStan report
        if: steps.phpstan.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: phpstan-report
          path: phpstan-report.json
          retention-days: 1
      - name: Fail on PHPStan errors
        if: steps.phpstan.outcome == 'failure'
        run: exit 1
