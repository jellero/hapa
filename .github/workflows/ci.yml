name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17-alpine@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
        env:
          POSTGRES_DB: hapa_test
          POSTGRES_USER: hapa
          POSTGRES_PASSWORD: ci-postgres-password
        ports: [5432:5432]
        options: >-
          --health-cmd "pg_isready -U hapa -d hapa_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7.4-alpine
        ports: [6379:6379]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      APP_ENV: testing
      APP_DEBUG: "false"
      APP_URL: http://localhost
      APP_TIMEZONE: UTC
      TRUSTED_PROXIES: ""
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: hapa_test
      DB_USERNAME: hapa
      DB_PASSWORD: ci-postgres-password
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      RABBITMQ_ENABLED: "false"
      LOG_LEVEL: warning
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, redis, intl, mbstring, sockets, zip
          coverage: none
      - run: composer install --no-interaction --prefer-dist
      - run: composer validate --strict
      - run: composer audit --locked
      - run: vendor/bin/phinx migrate -e testing
      - run: composer architecture:check
      - name: Run unit tests
        id: unit
        continue-on-error: true
        run: vendor/bin/phpunit --testsuite Unit --log-junit unit-junit.xml
      - name: Upload unit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-junit
          path: unit-junit.xml
          if-no-files-found: error
          retention-days: 3
      - name: Run integration tests
        id: integration
        if: always()
        continue-on-error: true
        run: vendor/bin/phpunit --testsuite Integration --log-junit integration-junit.xml
      - name: Upload integration report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-junit
          path: integration-junit.xml
          if-no-files-found: error
          retention-days: 3
      - name: Fail on test errors
        if: steps.unit.outcome == 'failure' || steps.integration.outcome == 'failure'
        run: exit 1

  production-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      APP_URL: https://hapa.example.com
      TRUSTED_PROXIES: 127.0.0.1,REMOTE_ADDR
      IMAGE_TAG: ${{ github.sha }}
      HAPA_HTTP_PORT: 18080
      DB_PASSWORD_FILE: /tmp/hapa-db-secret
      REDIS_PASSWORD_FILE: /tmp/hapa-redis-secret
      RABBITMQ_PASSWORD_FILE: /tmp/hapa-rabbitmq-secret
      AUTOMATION_ADMIN_API_URL: https://automation.internal.example.test
      AUTOMATION_ADMIN_API_TOKEN_FILE: /tmp/hapa-automation-admin-api-token
      RABBITMQ_ENABLED: "false"
      HAPA_MESSAGING_NETWORK: hapa-messaging
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Prepare production secrets and network
        run: |
          set -euo pipefail
          printf '%s' 'ci-production-database-secret' > "$DB_PASSWORD_FILE"
          printf '%s' 'ci-production-redis-secret' > "$REDIS_PASSWORD_FILE"
          printf '%s' 'ci-production-rabbitmq-secret' > "$RABBITMQ_PASSWORD_FILE"
          printf '%s' 'ci-production-automation-admin-api-token' > "$AUTOMATION_ADMIN_API_TOKEN_FILE"
          docker network inspect "$HAPA_MESSAGING_NETWORK" >/dev/null 2>&1 \
            || docker network create "$HAPA_MESSAGING_NETWORK"
      - name: Validate production Compose
        run: docker compose -f docker-compose.prod.yml config --quiet
      - name: Build production images
        id: production-build
        continue-on-error: true
        run: |
          set -o pipefail
          docker compose -f docker-compose.prod.yml build --progress=plain php migration nginx redis 2>&1 \
            | tee production-build.log
      - name: Upload production build report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-build-report
          path: production-build.log
          if-no-files-found: error
          retention-days: 3
      - name: Fail on production build errors
        if: steps.production-build.outcome == 'failure'
        run: exit 1
      - name: Start PostgreSQL
        run: docker compose -f docker-compose.prod.yml up -d --wait postgres
      - name: Start Redis
        run: docker compose -f docker-compose.prod.yml up -d --wait redis
      - name: Apply production migrations
        id: production-migration
        continue-on-error: true
        run: |
          set -o pipefail
          docker compose -f docker-compose.prod.yml --profile tools run --rm -T migration 2>&1 \
            | tee production-migration.log
      - name: Upload production migration report
        if: always() && steps.production-build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: production-migration-report
          path: production-migration.log
          if-no-files-found: error
          retention-days: 3
      - name: Fail on production migration errors
        if: steps.production-migration.outcome == 'failure'
        run: exit 1
      - name: Start PHP
        run: docker compose -f docker-compose.prod.yml up -d --wait php
      - name: Start Nginx
        run: docker compose -f docker-compose.prod.yml up -d --wait nginx
      - name: Verify liveness
        run: curl --fail --silent http://127.0.0.1:18080/health/live
      - name: Verify operational interface
        run: |
          set -euo pipefail
          base_url=http://127.0.0.1:18080
          routes=(
            /login
            /password/recovery
            /ui
            /ui/customers
            /ui/customers/SMOKE-CUSTOMER
            /ui/orders
            /ui/orders/SMOKE-ORDER
            /ui/catalog
            /ui/picking
            /ui/shipments
            /ui/integrations
            /ui/users
            /ui/audit
            /ui/settings
            /ui/profile
          )

          for route in "${routes[@]}"; do
            body="$(curl --fail --silent --show-error "$base_url$route")"
            grep --quiet '<!DOCTYPE html>' <<< "$body"
          done

          headers="$(curl --fail --silent --show-error --dump-header - --output /dev/null "$base_url/ui")"
          grep --ignore-case --quiet '^cache-control:.*no-store' <<< "$headers"
          grep --ignore-case --quiet "^content-security-policy:.*object-src 'none'" <<< "$headers"
          grep --ignore-case --quiet '^x-frame-options:.*DENY' <<< "$headers"

          css="$(curl --fail --silent --show-error "$base_url/assets/ui.css?v=5")"
          javascript="$(curl --fail --silent --show-error "$base_url/assets/ui.js?v=5")"
          grep --quiet ':root' <<< "$css"
          grep --quiet 'synchronizeNavigation' <<< "$javascript"

          headers="$(curl --silent --dump-header - --output /dev/null "$base_url/ui/automation" | tr -d '\r')"
          grep --fixed-strings --quiet 'HTTP/1.1 303 See Other' <<< "$headers"
          grep --fixed-strings --ignore-case --quiet 'location: /login?next=%2Fui%2Fautomation' <<< "$headers"
          headers="$(curl --silent --dump-header - --output /dev/null "$base_url/ui/not/a/real/page" | tr -d '\r')"
          grep --fixed-strings --quiet 'HTTP/1.1 303 See Other' <<< "$headers"
          grep --fixed-strings --ignore-case --quiet 'location: /login?next=%2Fui%2Fnot%2Fa%2Freal%2Fpage' <<< "$headers"
      - name: Show container diagnostics
        if: failure()
        run: |
          docker compose -f docker-compose.prod.yml ps
          docker compose -f docker-compose.prod.yml logs --no-color --tail=200
      - name: Stop production stack
        if: always()
        run: |
          docker compose -f docker-compose.prod.yml down -v
          docker network rm "$HAPA_MESSAGING_NETWORK" >/dev/null 2>&1 || true

  static-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, redis, intl, mbstring, sockets, zip
          coverage: none
      - run: composer install --no-interaction --prefer-dist --quiet
      - run: composer analyse
