name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17-alpine@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
        env:
          POSTGRES_DB: hapa_test
          POSTGRES_USER: hapa
          POSTGRES_PASSWORD: ci-postgres-password
        ports: [5432:5432]
        options: >-
          --health-cmd "pg_isready -U hapa -d hapa_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7.4-alpine
        ports: [6379:6379]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      APP_ENV: testing
      APP_DEBUG: "false"
      APP_URL: http://localhost
      APP_TIMEZONE: UTC
      TRUSTED_PROXIES: ""
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: hapa_test
      DB_USERNAME: hapa
      DB_PASSWORD: ci-postgres-password
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      LOG_LEVEL: warning
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, redis, intl, zip
          coverage: none
      - run: composer install --no-interaction --prefer-dist
      - run: composer validate --strict
      - run: composer audit --locked
      - run: vendor/bin/phinx migrate -e testing
      - run: composer architecture:check
      - run: composer test:unit
      - run: composer test:integration

  production-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Build and smoke production stack
        env:
          APP_URL: https://hapa.example.com
          TRUSTED_PROXIES: 127.0.0.1,REMOTE_ADDR
          IMAGE_TAG: ${{ github.sha }}
          HAPA_HTTP_PORT: 18080
          DB_PASSWORD_FILE: /tmp/hapa-db-secret
          REDIS_PASSWORD_FILE: /tmp/hapa-redis-secret
        run: |
          set -euo pipefail
          trap 'docker compose -f docker-compose.prod.yml down -v || true' EXIT
          printf '%s' 'ci-production-database-secret' > "$DB_PASSWORD_FILE"
          printf '%s' 'ci-production-redis-secret' > "$REDIS_PASSWORD_FILE"
          docker compose -f docker-compose.prod.yml config --quiet
          docker compose -f docker-compose.prod.yml build php migration nginx redis
          docker compose -f docker-compose.prod.yml up -d --wait postgres redis
          docker compose -f docker-compose.prod.yml --profile tools run --rm migration
          docker compose -f docker-compose.prod.yml up -d --wait php nginx
          curl --fail --silent http://127.0.0.1:18080/health/live

  static-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, redis, intl, zip
          coverage: none
      - run: composer install --no-interaction --prefer-dist --quiet
      - run: composer analyse
