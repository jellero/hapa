name: Generate Composer Lock

on:
  push:
    branches: [hardening/p0-security]
    paths:
      - composer.json
      - .github/workflows/generate-lock.yml

permissions:
  contents: write

jobs:
  lock:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: hardening/p0-security
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, redis, intl, zip
          coverage: none
      - run: composer update --no-install --no-interaction --prefer-dist
      - name: Commit lock file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add composer.lock
          git diff --cached --quiet || git commit -m "build: lock Composer dependencies"
          git push origin HEAD:hardening/p0-security
