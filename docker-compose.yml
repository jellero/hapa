x-app-environment: &app-environment
  APP_ENV: ${APP_ENV:-development}
  APP_DEBUG: ${APP_DEBUG:-true}
  APP_URL: ${APP_URL:-http://localhost:8080}
  APP_TIMEZONE: ${APP_TIMEZONE:-Europe/Rome}
  DB_HOST: postgres
  DB_PORT: 5432
  DB_DATABASE: ${DB_DATABASE:-hapa}
  DB_USERNAME: ${DB_USERNAME:-hapa}
  DB_PASSWORD: ${DB_PASSWORD:-hapa-local-change-me}
  DB_CONNECT_TIMEOUT: ${DB_CONNECT_TIMEOUT:-5}
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_PASSWORD: ${REDIS_PASSWORD:-hapa-local-redis-change-me}
  REDIS_CONNECT_TIMEOUT: ${REDIS_CONNECT_TIMEOUT:-2.0}
  INTEGRATION_CONNECT_TIMEOUT: ${INTEGRATION_CONNECT_TIMEOUT:-5.0}
  INTEGRATION_REQUEST_TIMEOUT: ${INTEGRATION_REQUEST_TIMEOUT:-30.0}
  INTEGRATION_MAX_RESPONSE_BYTES: ${INTEGRATION_MAX_RESPONSE_BYTES:-2097152}
  AUTOMATION_BATCH_SIZE: ${AUTOMATION_BATCH_SIZE:-50}
  AUTOMATION_LOCK_TIMEOUT: ${AUTOMATION_LOCK_TIMEOUT:-300}
  AUTOMATION_RETRY_BASE: ${AUTOMATION_RETRY_BASE:-30}
  AUTOMATION_RETRY_MAX: ${AUTOMATION_RETRY_MAX:-3600}
  LOG_LEVEL: ${LOG_LEVEL:-debug}

services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    environment: *app-environment
    volumes:
      - ./:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [backend]
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t >/dev/null 2>&1 && test -f /var/www/html/vendor/autoload.php"]
      interval: 15s
      timeout: 5s
      retries: 5

  nginx:
    build:
      context: .
      dockerfile: docker/nginx.Dockerfile
    ports:
      - "8080:80"
    depends_on:
      php:
        condition: service_healthy
    networks: [frontend, backend]
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-hapa}
      POSTGRES_USER: ${DB_USERNAME:-hapa}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hapa-local-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [backend]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-hapa} -d ${DB_DATABASE:-hapa}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-hapa-local-redis-change-me}"]
    networks: [backend]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a '${REDIS_PASSWORD:-hapa-local-redis-change-me}' ping | grep PONG"]
      interval: 10s
      timeout: 3s
      retries: 5

networks:
  frontend: {}
  backend:
    internal: true

volumes:
  postgres_data:
