x-app-environment: &app-environment
  APP_ENV: production
  APP_DEBUG: "false"
  APP_URL: ${APP_URL:?Set APP_URL}
  APP_TIMEZONE: ${APP_TIMEZONE:-Europe/Rome}
  TRUSTED_PROXIES: ${TRUSTED_PROXIES:-REMOTE_ADDR}
  DB_HOST: postgres
  DB_PORT: 5432
  DB_DATABASE: ${DB_DATABASE:-hapa}
  DB_USERNAME: ${DB_USERNAME:-hapa}
  DB_PASSWORD_FILE: /run/secrets/db_password
  DB_CONNECT_TIMEOUT: ${DB_CONNECT_TIMEOUT:-5}
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_PASSWORD_FILE: /run/secrets/redis_password
  REDIS_CONNECT_TIMEOUT: ${REDIS_CONNECT_TIMEOUT:-2.0}
  LOG_LEVEL: ${LOG_LEVEL:-info}

x-php-build: &php-build
  context: .
  dockerfile: docker/php/Dockerfile.prod
  args:
    PHP_BASE_IMAGE: ${PHP_BASE_IMAGE:?Set PHP_BASE_IMAGE}
    COMPOSER_BASE_IMAGE: ${COMPOSER_BASE_IMAGE:?Set COMPOSER_BASE_IMAGE}

services:
  php:
    image: hapa-php:${IMAGE_TAG:?Set IMAGE_TAG}
    build:
      <<: *php-build
      target: runtime
    environment: *app-environment
    secrets: [db_password, redis_password]
    user: www-data
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    volumes:
      - app_storage:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [edge, data]
    restart: unless-stopped
    stop_grace_period: 20s
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    pids_limit: 256
    mem_limit: 512m
    cpus: 1.0
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t >/dev/null 2>&1 && test -f /var/www/html/vendor/autoload.php"]
      interval: 30s
      timeout: 5s
      retries: 3

  migration:
    image: hapa-migration:${IMAGE_TAG:?Set IMAGE_TAG}
    build:
      <<: *php-build
      target: migration
    environment: *app-environment
    secrets: [db_password, redis_password]
    depends_on:
      postgres:
        condition: service_healthy
    networks: [data]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    profiles: [tools]

  nginx:
    image: hapa-nginx:${IMAGE_TAG:?Set IMAGE_TAG}
    build:
      context: .
      dockerfile: docker/nginx.Dockerfile
      args:
        NGINX_BASE_IMAGE: ${NGINX_BASE_IMAGE:?Set NGINX_BASE_IMAGE}
    ports:
      - "${HAPA_HTTP_BIND:-127.0.0.1}:${HAPA_HTTP_PORT:-8080}:80"
    read_only: true
    tmpfs:
      - /var/cache/nginx:noexec,nosuid,size=32m
      - /var/run:noexec,nosuid,size=8m
      - /tmp:noexec,nosuid,size=16m
    depends_on:
      php:
        condition: service_healthy
    networks: [edge]
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    cap_add: [CHOWN, SETGID, SETUID, NET_BIND_SERVICE]
    pids_limit: 128
    mem_limit: 128m
    cpus: 0.5
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/health/live || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  postgres:
    image: ${POSTGRES_IMAGE:?Set POSTGRES_IMAGE}
    environment:
      POSTGRES_DB: ${DB_DATABASE:-hapa}
      POSTGRES_USER: ${DB_USERNAME:-hapa}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets: [db_password]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [data]
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-hapa} -d ${DB_DATABASE:-hapa}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: hapa-redis:${IMAGE_TAG:?Set IMAGE_TAG}
    build:
      context: .
      dockerfile: docker/redis.Dockerfile
      args:
        REDIS_BASE_IMAGE: ${REDIS_BASE_IMAGE:?Set REDIS_BASE_IMAGE}
    environment:
      REDIS_PASSWORD_FILE: /run/secrets/redis_password
    secrets: [redis_password]
    tmpfs:
      - /tmp:noexec,nosuid,size=8m
    volumes:
      - redis_data:/data
    networks: [data]
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=$$(cat /run/secrets/redis_password) redis-cli ping | grep -qx PONG"]
      interval: 10s
      timeout: 3s
      retries: 5

networks:
  edge: {}
  data:
    internal: true

volumes:
  postgres_data:
  redis_data:
  app_storage:

secrets:
  db_password:
    file: ${DB_PASSWORD_FILE:?Set DB_PASSWORD_FILE}
  redis_password:
    file: ${REDIS_PASSWORD_FILE:?Set REDIS_PASSWORD_FILE}
