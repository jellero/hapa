x-app-environment: &app-environment
  APP_ENV: production
  APP_DEBUG: "false"
  APP_URL: ${APP_URL:?Set APP_URL}
  APP_TIMEZONE: ${APP_TIMEZONE:-Europe/Rome}
  DB_CONNECTION: pgsql
  DB_HOST: postgres
  DB_PORT: 5432
  DB_DATABASE: ${DB_DATABASE:-hapa}
  DB_USERNAME: ${DB_USERNAME:-hapa}
  DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD}
  DB_CONNECT_TIMEOUT: ${DB_CONNECT_TIMEOUT:-5}
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD}
  REDIS_CONNECT_TIMEOUT: ${REDIS_CONNECT_TIMEOUT:-2.0}
  LOG_LEVEL: ${LOG_LEVEL:-info}

services:
  php:
    image: hapa-php:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    environment: *app-environment
    user: www-data
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    volumes:
      - app_storage:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [backend]
    restart: unless-stopped
    stop_grace_period: 20s
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    pids_limit: 256
    mem_limit: 512m
    cpus: 1.0
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t >/dev/null 2>&1 && test -f /var/www/html/vendor/autoload.php"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    image: hapa-nginx:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: docker/nginx.Dockerfile
    ports:
      - "80:80"
    read_only: true
    tmpfs:
      - /var/cache/nginx:noexec,nosuid,size=32m
      - /var/run:noexec,nosuid,size=8m
      - /tmp:noexec,nosuid,size=16m
    depends_on:
      php:
        condition: service_healthy
    networks: [frontend, backend]
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    cap_add: [CHOWN, SETGID, SETUID, NET_BIND_SERVICE]
    pids_limit: 128
    mem_limit: 128m
    cpus: 0.5
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/health/live || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-hapa}
      POSTGRES_USER: ${DB_USERNAME:-hapa}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [backend]
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-hapa} -d ${DB_DATABASE:-hapa}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?Set REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    networks: [backend]
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a '$${REDIS_PASSWORD}' ping | grep PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD}

networks:
  frontend: {}
  backend:
    internal: true

volumes:
  postgres_data:
  redis_data:
  app_storage:
