x-database-environment: &database-environment
  APP_ENV: production
  DB_HOST: postgres
  DB_PORT: 5432
  DB_DATABASE: ${DB_DATABASE:-hapa}
  DB_USERNAME: ${DB_USERNAME:-hapa}
  DB_PASSWORD_FILE: /run/secrets/db_password
  DB_CONNECT_TIMEOUT: ${DB_CONNECT_TIMEOUT:-5}

x-app-environment: &app-environment
  <<: *database-environment
  APP_DEBUG: "false"
  APP_URL: ${APP_URL:?Set APP_URL}
  APP_TIMEZONE: ${APP_TIMEZONE:-Europe/Rome}
  TRUSTED_PROXIES: ${TRUSTED_PROXIES:?Set TRUSTED_PROXIES}
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_PASSWORD_FILE: /run/secrets/redis_password
  REDIS_CONNECT_TIMEOUT: ${REDIS_CONNECT_TIMEOUT:-2.0}
  RABBITMQ_ENABLED: ${RABBITMQ_ENABLED:-false}
  RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
  RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
  RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
  RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-hapa-publisher}
  RABBITMQ_PASSWORD_FILE: /run/secrets/rabbitmq_password
  RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-hapa.events}
  RABBITMQ_CONNECT_TIMEOUT: ${RABBITMQ_CONNECT_TIMEOUT:-5.0}
  RABBITMQ_READ_WRITE_TIMEOUT: ${RABBITMQ_READ_WRITE_TIMEOUT:-30.0}
  RABBITMQ_HEARTBEAT: ${RABBITMQ_HEARTBEAT:-30}
  OUTBOX_RELAY_WORKER_ID: ${OUTBOX_RELAY_WORKER_ID:-hapa-relay-production-1}
  OUTBOX_RELAY_BATCH_SIZE: ${OUTBOX_RELAY_BATCH_SIZE:-50}
  OUTBOX_RELAY_LOCK_TIMEOUT_SECONDS: ${OUTBOX_RELAY_LOCK_TIMEOUT_SECONDS:-300}
  OUTBOX_RELAY_RETRY_BASE_SECONDS: ${OUTBOX_RELAY_RETRY_BASE_SECONDS:-30}
  OUTBOX_RELAY_RETRY_MAX_SECONDS: ${OUTBOX_RELAY_RETRY_MAX_SECONDS:-3600}
  INTEGRATION_CONNECT_TIMEOUT: ${INTEGRATION_CONNECT_TIMEOUT:-5.0}
  INTEGRATION_REQUEST_TIMEOUT: ${INTEGRATION_REQUEST_TIMEOUT:-30.0}
  INTEGRATION_MAX_RESPONSE_BYTES: ${INTEGRATION_MAX_RESPONSE_BYTES:-2097152}
  AUTOMATION_ADMIN_API_URL: ${AUTOMATION_ADMIN_API_URL:?Set AUTOMATION_ADMIN_API_URL}
  AUTOMATION_ADMIN_API_TOKEN_FILE: /run/secrets/automation_admin_api_token
  AUTOMATION_ADMIN_API_TIMEOUT: ${AUTOMATION_ADMIN_API_TIMEOUT:-10.0}
  LOG_LEVEL: ${LOG_LEVEL:-info}

x-consumer-environment: &consumer-environment
  <<: *app-environment
  RABBITMQ_CONSUMER_ENABLED: ${RABBITMQ_CONSUMER_ENABLED:-false}
  RABBITMQ_CONSUMER_HOST: ${RABBITMQ_CONSUMER_HOST:-rabbitmq}
  RABBITMQ_CONSUMER_PORT: ${RABBITMQ_CONSUMER_PORT:-5672}
  RABBITMQ_CONSUMER_VHOST: ${RABBITMQ_CONSUMER_VHOST:-/}
  RABBITMQ_CONSUMER_USERNAME: ${RABBITMQ_CONSUMER_USERNAME:-hapa-consumer}
  RABBITMQ_CONSUMER_PASSWORD_FILE: /run/secrets/rabbitmq_consumer_password
  RABBITMQ_CONSUMER_EXCHANGE: ${RABBITMQ_CONSUMER_EXCHANGE:-hapa.events}
  RABBITMQ_CONSUMER_DEAD_EXCHANGE: ${RABBITMQ_CONSUMER_DEAD_EXCHANGE:-hapa.dead}
  RABBITMQ_CONSUMER_QUEUE: ${RABBITMQ_CONSUMER_QUEUE:-hapa.inbound.events}
  RABBITMQ_CONSUMER_DEAD_QUEUE: ${RABBITMQ_CONSUMER_DEAD_QUEUE:-hapa.inbound.dead}
  RABBITMQ_CONSUMER_BINDINGS: ${RABBITMQ_CONSUMER_BINDINGS:-integration.transport.#,space.catalog.item.observed,space.purchase_order.#,marketplace.order.observed,marketplace.offer.#}
  RABBITMQ_CONSUMER_CONNECT_TIMEOUT: ${RABBITMQ_CONSUMER_CONNECT_TIMEOUT:-5.0}
  RABBITMQ_CONSUMER_READ_WRITE_TIMEOUT: ${RABBITMQ_CONSUMER_READ_WRITE_TIMEOUT:-30.0}
  RABBITMQ_CONSUMER_HEARTBEAT: ${RABBITMQ_CONSUMER_HEARTBEAT:-30}
  RABBITMQ_CONSUMER_MAX_ATTEMPTS: ${RABBITMQ_CONSUMER_MAX_ATTEMPTS:-5}

services:
  php:
    image: hapa-php:${IMAGE_TAG:?Set IMAGE_TAG}
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
      target: runtime
    environment: *app-environment
    secrets: [db_password, redis_password, rabbitmq_password, automation_admin_api_token]
    user: www-data
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    volumes:
      - app_storage:/var/www/html/storage
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    networks: [backend, messaging]
    restart: unless-stopped
    stop_grace_period: 20s
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    pids_limit: 256
    mem_limit: 512m
    cpus: 1.0
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t >/dev/null 2>&1 && test -f /var/www/html/vendor/autoload.php"]
      interval: 30s
      timeout: 5s
      retries: 3

  outbox-relay:
    image: hapa-php:${IMAGE_TAG:?Set IMAGE_TAG}
    environment:
      <<: *app-environment
      RABBITMQ_ENABLED: "true"
    command: ["php", "bin/console", "outbox:relay", "--watch"]
    secrets: [db_password, redis_password, rabbitmq_password, automation_admin_api_token]
    user: www-data
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=32m
    volumes:
      - app_storage:/var/www/html/storage
    depends_on:
      postgres: {condition: service_healthy}
    networks: [backend, messaging]
    profiles: [messaging]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    pids_limit: 128
    mem_limit: 256m
    cpus: 0.5

  inbox-consumer:
    image: hapa-php:${IMAGE_TAG:?Set IMAGE_TAG}
    environment:
      <<: *consumer-environment
      RABBITMQ_CONSUMER_ENABLED: "true"
    command: ["php", "bin/console", "inbox:consume", "--watch"]
    secrets: [db_password, redis_password, rabbitmq_password, rabbitmq_consumer_password, automation_admin_api_token]
    user: www-data
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=32m
    volumes:
      - app_storage:/var/www/html/storage
    depends_on:
      postgres: {condition: service_healthy}
    networks: [backend, messaging]
    profiles: [messaging]
    restart: unless-stopped
    stop_grace_period: 20s
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    pids_limit: 128
    mem_limit: 256m
    cpus: 0.5

  migration:
    image: hapa-migration:${IMAGE_TAG:?Set IMAGE_TAG}
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
      target: migration
    environment: *database-environment
    secrets: [db_password]
    user: www-data
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=32m
    networks: [backend]
    depends_on:
      postgres: {condition: service_healthy}
    profiles: [tools]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    pids_limit: 128
    mem_limit: 256m
    cpus: 0.5

  nginx:
    image: hapa-nginx:${IMAGE_TAG:?Set IMAGE_TAG}
    build:
      context: .
      dockerfile: docker/nginx.Dockerfile
    ports:
      - "${HAPA_HTTP_BIND:-127.0.0.1}:${HAPA_HTTP_PORT:-8080}:80"
    read_only: true
    tmpfs:
      - /var/cache/nginx:noexec,nosuid,size=32m
      - /var/run:noexec,nosuid,size=8m
      - /tmp:noexec,nosuid,size=16m
    depends_on:
      php: {condition: service_healthy}
    networks: [frontend, backend]
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    cap_add: [CHOWN, SETGID, SETUID, NET_BIND_SERVICE]
    pids_limit: 128
    mem_limit: 128m
    cpus: 0.5
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/health/live || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-hapa}
      POSTGRES_USER: ${DB_USERNAME:-hapa}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets: [db_password]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [backend]
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-hapa} -d ${DB_DATABASE:-hapa}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: hapa-redis:${IMAGE_TAG:?Set IMAGE_TAG}
    build:
      context: .
      dockerfile: docker/redis.Dockerfile
    environment:
      REDIS_PASSWORD_FILE: /run/secrets/redis_password
    secrets: [redis_password]
    tmpfs:
      - /tmp:noexec,nosuid,size=8m
    volumes:
      - redis_data:/data
    networks: [backend]
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=$$(cat /run/secrets/redis_password) redis-cli ping | grep -qx PONG"]
      interval: 10s
      timeout: 3s
      retries: 5

networks:
  frontend: {}
  backend:
    internal: true
  messaging:
    name: ${HAPA_MESSAGING_NETWORK:-hapa-messaging}
    external: true

volumes:
  postgres_data:
  redis_data:
  app_storage:

secrets:
  db_password:
    file: ${DB_PASSWORD_FILE:?Set DB_PASSWORD_FILE}
  redis_password:
    file: ${REDIS_PASSWORD_FILE:?Set REDIS_PASSWORD_FILE}
  rabbitmq_password:
    file: ${RABBITMQ_PASSWORD_FILE:-./secrets/rabbitmq_password.txt}
  rabbitmq_consumer_password:
    file: ${RABBITMQ_CONSUMER_PASSWORD_FILE:-./secrets/rabbitmq_consumer_password.txt}
  automation_admin_api_token:
    file: ${AUTOMATION_ADMIN_API_TOKEN_FILE:-./secrets/automation_admin_api_token.txt}
