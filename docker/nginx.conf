server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;
    server_tokens off;

    client_max_body_size 20m;

    location = /nginx-health {
        allow 127.0.0.1;
        deny all;
        access_log off;
        return 204;
    }

    location /assets/ {
        try_files $uri =404;
        access_log off;
        expires 7d;
    }

    location ~ /\. {
        deny all;
    }

    location ~* /(composer\.(json|lock)|phpstan\.neon|phpunit\.xml|phinx\.php|\.env)$ {
        deny all;
    }

    location = /health/ready {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        access_log off;
        try_files $uri /index.php$is_args$args;
    }

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location = /index.php {
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param DOCUMENT_ROOT $document_root;
        fastcgi_param HTTP_PROXY "";
        fastcgi_connect_timeout 5s;
        fastcgi_read_timeout 65s;
        fastcgi_hide_header X-Powered-By;
    }

    location ~ \.php$ {
        return 404;
    }

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self'; script-src 'self'; frame-ancestors 'none'; base-uri 'none'; form-action 'self'" always;
}
